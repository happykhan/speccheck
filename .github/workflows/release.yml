name: Release

# Runs manually when maintainers are ready to cut a release.
# 1. Verifies that the requested version is already prepared consistently.
# 2. Creates an annotated git tag at the validated main commit.
# 3. Builds and publishes the PyPI package.
# 4. Creates a GitHub release.
# 5. Builds and pushes the Docker image to Docker Hub.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Prepared release version (for example, 1.3.0)
        required: true
        type: string

permissions:
  contents: write   # needed to push the tag and create a release
  id-token: write   # needed for PyPI trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/speccheck-qc

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can inspect commit messages
          fetch-depth: 0
          # Use a token that allows pushing the validated release tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate prepared release metadata
        id: version
        run: |
          RELEASE_VERSION="${{ inputs.version }}"
          python - "$RELEASE_VERSION" <<'EOF'
          import pathlib
          import re
          import sys
          import tomllib

          requested = sys.argv[1]
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", requested):
              raise SystemExit(f"Invalid release version: {requested!r}")

          with pathlib.Path("pyproject.toml").open("rb") as handle:
              package_version = tomllib.load(handle)["project"]["version"]
          citation = pathlib.Path("CITATION.cff").read_text(encoding="utf-8")
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          expected = {
              "pyproject.toml": package_version == requested,
              "CITATION.cff": f"version: {requested}" in citation,
              "CHANGELOG.md": f"## {requested} -" in changelog,
          }
          mismatches = [name for name, matches in expected.items() if not matches]
          if mismatches:
              raise SystemExit(
                  f"Release {requested} is not prepared consistently in: "
                  + ", ".join(mismatches)
              )
          print(f"Validated prepared release {requested}")
          EOF
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - name: Tag validated commit
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.release_version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${RELEASE_VERSION} already exists"
            exit 1
          fi
          git tag -a "v${RELEASE_VERSION}" -m "speccheck ${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      # ------------------------------------------------------------------ #
      # 4. Create GitHub release                                            #
      # ------------------------------------------------------------------ #
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release_version }}
          name: v${{ steps.version.outputs.release_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------ #
      # 5. Build and push Docker image                                      #
      # ------------------------------------------------------------------ #
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.release_version }}
          tags: |
            happykhan/speccheck:${{ steps.version.outputs.release_version }}
            happykhan/speccheck:latest
