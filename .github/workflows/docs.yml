name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy to GitHub Pages. Requires Pages enabled with source set to GitHub Actions.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . mkdocs-material
      - name: Build site
        run: mkdocs build --strict
      - name: Configure Pages
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deployment skipped
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_pages }}
        run: |
          echo "Docs built successfully."
          echo "Pages deployment is skipped unless this workflow is run manually with deploy_pages=true."
          echo "Before deploying, enable Pages in repository settings and select GitHub Actions as the source."

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
