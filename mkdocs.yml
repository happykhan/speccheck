site_name: speccheck
site_url: https://happykhan.github.io/speccheck/
repo_url: https://github.com/happykhan/speccheck
repo_name: happykhan/speccheck
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.snippets
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - CLI Usage: cli.md
  - Inputs and Pipelines:
      - Supported Inputs and Extensions: modules.md
      - Pipeline Integration: ghru.md
      - Criteria and Thresholds: criteria.md
      - QualiBact Compatibility: qualibact.md
  - Reports and Manuscript:
      - Reports: reports.md
      - Manuscript Assets: manuscript.md
      - Manuscript Methods: methods.md
  - Development: development.md
