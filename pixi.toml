[project]
name = "speccheck"
version = "1.3.0"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
pip = "*"
pytest = ">=7"
pytest-cov = ">=4"
openjdk = "17.*"
nextflow = "==24.10.3"
requests = ">=2.28"
pandas = ">=2.0"
jinja2 = ">=3.0"
plotly = ">=5.0"
openpyxl = ">=3.1"
rich = ">=13.0"
typer = ">=0.9,<0.26"

[pypi-dependencies]
speccheck-qc = { path = ".", editable = true }

[tasks]
test = "pytest -q"
summary-demo = "python scripts/generate_qualibact_example_reports.py"
worked-example-assets = "python scripts/create_worked_example_assets.py"
release-preflight = "python scripts/release_preflight.py"
